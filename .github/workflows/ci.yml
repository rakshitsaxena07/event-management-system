name: Spring Boot CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant permission for Gradle wrapper
        run: chmod +x Backend/event-management-system/gradlew

      - name: Build project
        working-directory: Backend/event-management-system
        run: ./gradlew build