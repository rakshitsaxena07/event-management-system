name: Spring Boot CI

# Trigger the workflow on Pull Requests to the main branch
on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code from your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the Java environment 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
    
      # 3️. Give execute permission to gradlew
      - name: Grant permission for Gradle wrapper
        run: chmod +x gradlew

      # 4. Build and run tests
      - name: Build with Gradle
        run: ./gradlew build

     # 5️. Run tests
      - name: Run Tests
        run: ./gradlew test
        